<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
 xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" >
<link rel="stylesheet"
type="text/css"href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
<head>
<meta charset="utf-8">
<title>Ajout des produits de beauté</title>
</head>
<body>
<div th:replace="template"></div>
<div class="container mt-5">
<div class="card">
<div class="card-header"> Ajout des des produits de beauté</div>
<div class="card-body">
 <form th:action="@{saveMakeup}" method="post">
 <div class="form-group">
<label class="control-label">Nom Makeup :</label>
<input type="text" name="nomMakeup" class="form-control" />
 </div>
 <div class="form-group">
<label class="control-label">Prix Makeup :</label>
<input type="text" name="prixMakeup" class="form-control" />
 </div>
 <div class="form-group">
 <label class="control-label">date création :</label>
<input type="date" name="dateCreation" class="form-control" />
 </div>
 <div>
 <button type="submit" class="btn btn-primary">Valider</button>
 </div>
 </form>
</div>
 </div>
 </div>
</body>
</html>
